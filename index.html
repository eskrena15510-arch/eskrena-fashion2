<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MGstor | متجر احترافي</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background-color: #f0f2f5; margin: 0; padding: 10px; }
        
        /* السلة */
        .cart-section { background: #fff; padding: 15px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .cart-section input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; }
        .btn-order { width: 100%; padding: 12px; background: #25d366; color: #fff; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }

        /* شبكة المنتجات - ده اللي هيخلي الشكل احترافي */
        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        
        .product-card { background: #fff; border-radius: 15px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; padding: 10px; }
        .product-card img { width: 100%; height: 150px; object-fit: cover; border-radius: 10px; }
        .product-card h3 { font-size: 14px; margin: 10px 0 5px; }
        .product-card p { font-size: 13px; color: #666; margin: 0 0 10px; }
        .btn-add { width: 100%; padding: 8px; background: #333; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<h2 style="text-align: center;">MGstor 🎁</h2>

<div class="cart-section">
    <h3>🛒 سلة المشتريات</h3>
    <ul id="cart-list" style="padding-right: 20px; font-size: 14px;"></ul>
    <p>الإجمالي: <span id="total" style="color: #d32f2f; font-weight: bold;">0</span> جنيه</p>
    <input type="text" id="name" placeholder="الاسم الكريم">
    <input type="tel" id="phone" placeholder="رقم الهاتف">
    <input type="text" id="address" placeholder="عنوان التوصيل">
    <button class="btn-order" onclick="sendOrder()">إرسال الطلب عبر واتساب</button>
</div>

<div class="products-grid" id="products">
    <!-- مثال لمنتج: كرر هذا البلوك لكل المنتجات -->
    <div class="product-card">
        <img src="IMG_3010.jpeg" alt="product">
        <h3>أسورة كابلز</h3>
        <p>150 جنيه</p>
        <button class="btn-add" onclick="addItem('أسورة كابلز', 150)">أضف للسلة</button>
    </div>
    <!-- انسخ السطور اللي فوق وكررها وغير اسم الصورة والبيانات -->
</div>

<script>
    let cart = []; let total = 0;
    function addItem(name, price) {
        cart.push({name, price});
        total += price;
        updateCart();
    }
    function updateCart() {
        let list = document.getElementById('cart-list');
        list.innerHTML = cart.map(item => `<li>${item.name} - ${item.price} ج</li>`).join('');
        document.getElementById('total').innerText = total;
    }
    function sendOrder() {
        let n = document.getElementById('name').value;
        let p = document.getElementById('phone').value;
        let a = document.getElementById('address').value;
        if(!n || !p || !a) return alert("من فضلك املأ البيانات");
        let msg = `طلب جديد من ${n}%0Aالهاتف: ${p}%0Aالعنوان: ${a}%0Aالطلبات: ${cart.map(i => i.name).join(', ')}%0Aالإجمالي: ${total} جنيه`;
        window.open(`https://wa.me/201064031909?text=${msg}`);
    }
</script>
</body>
</html>

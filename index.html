<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>MGstor | متجر الهدايا</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">MGstor 🛍️</div>
</header>

<section class="category">
    <h2>⌚ الساعات</h2>
    <div class="products-grid">
        <div class="card">
            <img src="watch.jpg" alt="ساعة">
            <h3>ساعة كلاسيك</h3>
            <p class="price">300 ج.م</p>
            <button onclick="addToCart('ساعة كلاسيك', 300)">أضف للسلة</button>
        </div>
    </div>
</section>

<section class="category">
    <h2>🧴 البرفانات</h2>
    <div class="products-grid">
        <div class="card">
            <img src="perfume.jpg" alt="برفان">
            <h3>برفان رويال</h3>
            <p class="price">450 ج.م</p>
            <button onclick="addToCart('برفان رويال', 450)">أضف للسلة</button>
        </div>
    </div>
</section>

<button class="cart-btn" onclick="toggleCart()">🛒 السلة (<span id="cart-count">0</span>)</button>

<div id="cart" class="cart hidden">
    <h3>سلة المشتريات</h3>
    <ul id="cart-items"></ul>
    <div id="total">الإجمالي: 0 ج.م</div>
    <input type="text" id="name" placeholder="الاسم">
    <input type="text" id="phone" placeholder="الهاتف">
    <button class="checkout-btn" onclick="submitOrder()">إرسال الطلب واتساب 💬</button>
</div>

<script src="script.js"></script>
</body>
</html>

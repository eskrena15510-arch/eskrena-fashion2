<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>MGstor | متجر الهدايا</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .products { display: block; max-width: 600px; margin: 0 auto; }
        .card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .card img { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; }
        #orderSummary { background: #fff; padding: 20px; border-radius: 15px; margin-bottom: 30px; border: 2px dashed #25d366; text-align: center; max-width: 600px; margin: 0 auto 20px auto; }
        .order-btn { background: #25d366; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .filter-btn { padding: 10px 15px; margin: 5px; cursor: pointer; border: none; background: #333; color: white; border-radius: 5px; }
    </style>
</head>
<body>

<h1 style="text-align:center;">MGstor</h1>

<div id="orderSummary">
    <h3>🛒 سلة طلباتك</h3>
    <div id="cartList" style="margin: 10px 0; text-align: right;">لا توجد منتجات مضافة</div>
    <p>الإجمالي: <span id="totalPrice">0</span> جنيه</p>
    <button class="order-btn" onclick="sendWhatsApp()">إرسال الطلب عبر واتساب 📲</button>
</div>

<div style="text-align:center; margin-bottom:20px;">
    <button class="filter-btn" onclick="filter('all')">الكل</button>
    <button class="filter-btn" onclick="filter('box')">🎁 بوكسات</button>
    <button class="filter-btn" onclick="filter('bracelet')">📿 أساور</button>
    <button class="filter-btn" onclick="filter('necklace')">💎 سلاسل</button>
    <button class="filter-btn" onclick="filter('ring')">💍 خواتم</button>
</div>

<div class="products">
    <div class="card box"><img src="box1.png"><h3>بوكس هدايا MGstor</h3><p>600 جنيه</p><button onclick="addToCart('بوكس هدايا MGstor', 600)">أضف للسلة</button></div>
    <div class="card bracelet"><img src="IMG_2822.jpeg"><h3>اسورة آية الكرسي</h3><p>120 جنيه</p><button onclick="addToCart('اسورة آية الكرسي', 120)">أضف للسلة</button></div>
    <div class="card bracelet"><img src="cartier.jpg"><h3>اسورة كارتير</h3><p>180 جنيه</p><button onclick="addToCart('اسورة كارتير', 180)">أضف للسلة</button></div>
    <div class="card necklace"><img src="IMG_2853.jpeg"><h3>سلسلة قلب مميزة</h3><p>150 جنيه</p><button onclick="addToCart('سلسلة قلب', 150)">أضف للسلة</button></div>
    <div class="card necklace"><img src="IMG_2823.jpeg"><h3>سلسلة حروف</h3><p>150 جنيه</p><button onclick="addToCart('سلسلة حروف', 150)">أضف للسلة</button></div>
    <div class="card necklace"><img src="name.jpg"><h3>سلسلة أسماء</h3><p>170 جنيه</p><button onclick="addToCart('سلسلة أسماء', 170)">أضف للسلة</button></div>
    <div class="card ring"><img src="e53e03a6-5241-45fa-85c7-8e0f53ae457c.jpeg"><h3>خاتم أنت عمري</h3><p>250 جنيه</p><button onclick="addToCart('خاتم أنت عمري', 250)">أضف للسلة</button></div>
</div>

<script>
    let cart = [];
    let total = 0;

    function addToCart(name, price) {
        cart.push({name, price});
        total += price;
        updateSummary();
    }

    function updateSummary() {
        let list = document.getElementById('cartList');
        list.innerHTML = cart.map(item => `• ${item.name} (${item.price} ج.م)<br>`).join('');
        document.getElementById('totalPrice').innerText = total;
    }

    function filter(cat) {
        let items = document.querySelectorAll('.card');
        items.forEach(item => {
            if (cat === 'all' || item.classList.contains(cat)) { item.style.display = 'block'; }
            else { item.style.display = 'none'; }
        });
    }

    function sendWhatsApp() {
        if(cart.length === 0) { alert("السلة فارغة!"); return; }
        let msg = "طلب جديد من المتجر:%0A" + cart.map(i => i.name).join(', ') + "%0Aالإجمالي: " + total + " جنيه";
        window.open(`https://wa.me/201064031909?text=${msg}`, '_blank');
    }
</script>

</body>
</html>

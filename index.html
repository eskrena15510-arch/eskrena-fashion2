<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>MGstor</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eee; }
        .card { background: white; padding: 15px; margin-bottom: 20px; border-radius: 10px; text-align: center; }
        .card img { width: 100%; max-width: 300px; height: auto; border-radius: 10px; }
        .cart-box { background: #fff; padding: 15px; border: 2px solid green; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="cart-box">
    <h3>سلة الطلبات</h3>
    <ul id="cart-list"></ul>
    <p>الإجمالي: <span id="total">0</span> جنيه</p>
    <button onclick="sendOrder()">إرسال الطلب واتساب</button>
</div>

<div id="products">
    <div class="card">
        <img src="box1.png" alt="منتج">
        <h3>بوكس هدايا MGstor</h3>
        <p>600 جنيه</p>
        <button onclick="addItem('بوكس هدايا', 600)">إضافة</button>
    </div>
    <div class="card">
        <img src="IMG_2822.jpeg" alt="منتج">
        <h3>اسورة آية الكرسي</h3>
        <p>120 جنيه</p>
        <button onclick="addItem('اسورة آية الكرسي', 120)">إضافة</button>
    </div>
</div>

<script>
    let cart = [];
    let total = 0;

    function addItem(name, price) {
        cart.push(name);
        total += price;
        
        let li = document.createElement("li");
        li.innerText = name + " - " + price + " جنيه";
        document.getElementById("cart-list").appendChild(li);
        document.getElementById("total").innerText = total;
        
        alert("تمت الإضافة!");
    }

    function sendOrder() {
        let text = "الطلب: " + cart.join(", ") + " | الإجمالي: " + total;
        window.open("https://wa.me/201064031909?text=" + encodeURIComponent(text));
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>MGstor | متجر الهدايا</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eee; }
        .card { background: white; padding: 15px; margin-bottom: 20px; border-radius: 10px; text-align: center; }
        .card img { width: 100%; max-width: 300px; height: auto; border-radius: 10px; }
        
        /* تنسيق السلة والنموذج */
        .cart-box { background: #fff; padding: 20px; border: 2px solid #25d366; border-radius: 10px; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background: #25d366; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="cart-box">
    <h3>🛒 سلة الطلبات</h3>
    <ul id="cart-list"></ul>
    <p>الإجمالي: <span id="total">0</span> جنيه</p>
    
    <hr>
    <h4>بيانات التوصيل:</h4>
    <input type="text" id="name" placeholder="الاسم بالكامل">
    <input type="tel" id="phone" placeholder="رقم الهاتف">
    <input type="text" id="address" placeholder="العنوان بالتفصيل">
    <input type="text" id="city" placeholder="المحافظة">
    
    <button onclick="sendOrder()">إرسال الطلب عبر واتساب 📲</button>
</div>

<div id="products">
    <div class="card">
        <img src="box1.png">
        <h3>بوكس هدايا MGstor</h3>
        <p>600 جنيه</p>
        <button onclick="addItem('بوكس هدايا MGstor', 600)">إضافة للسلة</button>
    </div>
    <div class="card">
        <img src="IMG_2822.jpeg">
        <h3>اسورة آية الكرسي</h3>
        <p>120 جنيه</p>
        <button onclick="addItem('اسورة آية الكرسي', 120)">إضافة للسلة</button>
    </div>
</div>

<script>
    let cart = [];
    let total = 0;

    function addItem(name, price) {
        cart.push(name);
        total += price;
        let li = document.createElement("li");
        li.innerText = name + " (" + price + " جنيه)";
        document.getElementById("cart-list").appendChild(li);
        document.getElementById("total").innerText = total;
    }

    function sendOrder() {
        let name = document.getElementById('name').value;
        let phone = document.getElementById('phone').value;
        let address = document.getElementById('address').value;
        let city = document.getElementById('city').value;

        if(!name || !phone || !address || !city) {
            alert("من فضلك أكمل بيانات التوصيل أولاً!");
            return;
        }

        let text = `طلب جديد:%0Aالاسم: ${name}%0Aالهاتف: ${phone}%0Aالعنوان: ${address}%0Aالمحافظة: ${city}%0Aالمنتجات: ${cart.join(", ")}%0Aالإجمالي: ${total} جنيه`;
        window.open("https://wa.me/201064031909?text=" + text);
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MGstor | المتجر</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 10px; }
        .nav-bar { display: flex; overflow-x: auto; background: white; padding: 10px; border-radius: 12px; margin-bottom: 20px; gap: 10px; }
        .nav-btn { background: #333; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; white-space: nowrap; }
        .card { background: white; padding: 15px; margin-bottom: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* السلايدر */
        .slider { position: relative; width: 100%; height: 250px; overflow: hidden; border-radius: 12px; margin-bottom: 10px; }
        .slider img { display: none; width: 100%; height: 100%; object-fit: cover; }
        .slider img.active { display: block; }
        .nav-arrows { display: flex; justify-content: space-between; margin-bottom: 10px; }

        .cart-box { background: #fff; padding: 20px; border: 2px dashed #25d366; border-radius: 15px; margin-bottom: 30px; }
        .buy-btn { background: #25d366; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        input { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        li { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 5px 0; }
        .del-btn { background: #ff4757; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<h1 style="text-align:center;">MGstor 🎁</h1>

<div class="nav-bar">
    <button class="nav-btn" onclick="filter('all')">الكل</button>
    <button class="nav-btn" onclick="filter('box')">🎁 بوكسات</button>
    <button class="nav-btn" onclick="filter('bracelet')">📿 أساور</button>
    <button class="nav-btn" onclick="filter('necklace')">💎 سلاسل</button>
    <button class="nav-btn" onclick="filter('ring')">💍 خواتم</button>
</div>

<div class="cart-box">
    <h3>🛒 سلة طلباتك</h3>
    <ul id="cart-list"></ul>
    <p>الإجمالي: <span id="total" style="color:red; font-weight:bold;">0</span> جنيه</p>
    <input type="text" id="name" placeholder="الاسم">
    <input type="tel" id="phone" placeholder="الهاتف">
    <input type="text" id="address" placeholder="العنوان">
    <button class="buy-btn" onclick="sendOrder()">إرسال الطلب واتساب 📲</button>
</div>

<div id="products">
    <!-- مثال لمنتج بصورتين (أضف هذا لكل منتج لديك) -->
    <div class="card box">
        <div class="slider">
            <img src="box1.png" class="active">
            <img src="box1-2.jpg">
        </div>
        <div class="nav-arrows">
            <button onclick="prev(this)">⬅</button>
            <button onclick="next(this)">➡</button>
        </div>
        <h3>بوكس هدايا ديلوكس</h3><p>600 ج</p>
        <button onclick="addItem('بوكس ديلوكس', 600)">أضف للسلة 🛒</button>
    </div>
    
    <!-- يمكنك تكرار هذا النمط لكل منتج -->
</div>

<script>
    let cart = []; let total = 0;
    
    // دوال السلايدر
    function next(btn) {
        let slider = btn.parentElement.parentElement.querySelector('.slider');
        let imgs = slider.querySelectorAll('img');
        let active = slider.querySelector('img.active');
        let next = active.nextElementSibling || imgs[0];
        active.classList.remove('active');
        next.classList.add('active');
    }
    function prev(btn) {
        let slider = btn.parentElement.parentElement.querySelector('.slider');
        let imgs = slider.querySelectorAll('img');
        let active = slider.querySelector('img.active');
        let prev = active.previousElementSibling || imgs[imgs.length - 1];
        active.classList.remove('active');
        prev.classList.add('active');
    }

    // دوال المتجر
    function addItem(name, price) { cart.push({name, price}); total += price; renderCart(); }
    function removeItem(index) { total -= cart[index].price; cart.splice(index, 1); renderCart(); }
    function renderCart() {
        let list = document.getElementById("cart-list"); list.innerHTML = "";
        cart.forEach((item, index) => { list.innerHTML += `<li>${item.name} (${item.price} ج) <button class="del-btn" onclick="removeItem(${index})">حذف</button></li>`; });
        document.getElementById("total").innerText = total;
    }
    function filter(cat) { document.querySelectorAll('.card').forEach(item => { item.style.display = (cat === 'all' || item.classList.contains(cat)) ? "block" : "none"; }); }
    function sendOrder() {
        let name = document.getElementById('name').value; let phone = document.getElementById('phone').value; let addr = document.getElementById('address').value;
        if(!name || !phone || !addr) { alert("يرجى ملء البيانات!"); return; }
        let msg = `طلب جديد:%0Aالمنتجات: ${cart.map(i => i.name).join(', ')}%0Aالإجمالي: ${total} ج%0Aالاسم: ${name}%0Aالهاتف: ${phone}%0Aالعنوان: ${addr}`;
        window.open("https://wa.me/201064031909?text=" + msg);
    }
</script>
</body>
</html>

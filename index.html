<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>MGstor | متجر الهدايا</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #f9f9f9; }
        
        /* تنسيق المنتجات (صور كبيرة) */
        .card { background: white; padding: 20px; margin-bottom: 25px; border-radius: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 350px; object-fit: cover; border-radius: 15px; margin-bottom: 10px; }
        
        /* تنسيق الأزرار (تصميم بارز وواضح) */
        button { background: #333; color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #555; transform: scale(1.05); }
        
        /* السلة والنموذج */
        .cart-box { background: #fff; padding: 25px; border: 3px solid #25d366; border-radius: 20px; margin-bottom: 30px; }
        input { width: 100%; padding: 15px; margin: 8px 0; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .send-btn { background: #25d366; width: 100%; font-size: 18px; margin-top: 15px; }
        
        /* تنسيق الأصناف */
        .category-btns { text-align: center; margin-bottom: 25px; }
    </style>
</head>
<body>

<h1 style="text-align:center;">🛍️ MGstor</h1>

<div class="cart-box">
    <h2 style="text-align:center;">🛒 سلة طلباتك</h2>
    <ul id="cart-list" style="font-size: 18px; font-weight: bold;"></ul>
    <p style="font-size: 20px;">الإجمالي: <span id="total" style="color: #e74c3c;">0</span> جنيه</p>
    
    <hr>
    <h4>📋 بيانات التوصيل</h4>
    <input type="text" id="name" placeholder="الاسم بالكامل">
    <input type="tel" id="phone" placeholder="رقم الهاتف">
    <input type="text" id="address" placeholder="العنوان بالتفصيل">
    <input type="text" id="city" placeholder="المحافظة">
    
    <button class="send-btn" onclick="sendOrder()">إرسال الطلب عبر واتساب 📲</button>
</div>

<div class="category-btns">
    <button onclick="filter('all')">الكل</button>
    <button onclick="filter('box')">🎁 بوكسات</button>
    <button onclick="filter('bracelet')">📿 أساور</button>
</div>

<div id="products">
    <div class="card box">
        <img src="box1.png">
        <h3>بوكس هدايا MGstor</h3>
        <p style="font-size: 18px; color: #555;">600 جنيه</p>
        <button onclick="addItem('بوكس هدايا MGstor', 600)">إضافة للسلة 🛒</button>
    </div>
    <div class="card bracelet">
        <img src="IMG_2822.jpeg">
        <h3>اسورة آية الكرسي</h3>
        <p style="font-size: 18px; color: #555;">120 جنيه</p>
        <button onclick="addItem('اسورة آية الكرسي', 120)">إضافة للسلة 🛒</button>
    </div>
</div>

<script>
    let cart = [];
    let total = 0;

    function addItem(name, price) {
        cart.push(name);
        total += price;
        let li = document.createElement("li");
        li.innerText = name + " (" + price + " جنيه)";
        document.getElementById("cart-list").appendChild(li);
        document.getElementById("total").innerText = total;
        alert("تم إضافة " + name + " للسلة!");
    }

    function filter(cat) {
        let items = document.querySelectorAll('.card');
        items.forEach(item => {
            item.style.display = (cat === 'all' || item.classList.contains(cat)) ? "block" : "none";
        });
    }

    function sendOrder() {
        let name = document.getElementById('name').value;
        let phone = document.getElementById('phone').value;
        let address = document.getElementById('address').value;
        let city = document.getElementById('city').value;

        if(!name || !phone || !address || !city) {
            alert("⚠️ من فضلك أكمل جميع بيانات التوصيل!");
            return;
        }

        let text = `طلب جديد:%0Aالاسم: ${name}%0Aالهاتف: ${phone}%0Aالعنوان: ${address}%0Aالمحافظة: ${city}%0Aالمنتجات: ${cart.join(", ")}%0Aالإجمالي: ${total} جنيه`;
        window.open("https://wa.me/201064031909?text=" + text);
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>MGstor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">MGstor</div>
    <nav>
        <a href="#">الرئيسية</a>
        <a href="#products">المنتجات</a>
    </nav>
</header>

<section id="products" class="products">
    <div class="card" onclick="addToCart('بوكس هدايا MGstor', 600)">
        <h3>بوكس هدايا MGstor</h3>
        <p class="price">600 جنيه</p>
        <button>أضف للسلة</button>
    </div>
</section>

<div class="cart-box">
    <button class="cart-btn" onclick="toggleCart()">🛒 السلة (<span id="cart-count">0</span>)</button>
    <div id="cart" class="cart hidden">
        <h3>سلة المشتريات</h3>
        <ul id="cart-items"></ul>
        <div class="cart-total">الإجمالي: <span id="cart-total-price">0</span> جنيه</div>
        <div class="checkout-form">
            <input type="text" id="client-name" placeholder="الاسم">
            <input type="text" id="client-phone" placeholder="رقم الهاتف">
            <input type="text" id="client-address" placeholder="العنوان">
            <button class="checkout-btn" onclick="submitOrder()">إرسال الطلب</button>
        </div>
        <button onclick="toggleCart()">إغلاق</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>

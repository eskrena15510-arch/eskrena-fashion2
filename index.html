<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>متجر MGstor</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 10px; }
        .card { background: white; padding: 15px; margin-bottom: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .slider { position: relative; width: 100%; height: 250px; overflow: hidden; border-radius: 12px; margin-bottom: 5px; }
        .slider img { display: none; width: 100%; height: 100%; object-fit: cover; }
        .slider img.active { display: block; }
        .nav-arrows { display: flex; justify-content: space-between; padding: 5px; }
        button { cursor: pointer; padding: 8px 15px; border-radius: 5px; border: none; background: #ddd; }
        .buy-btn { background: #25d366; color: white; width: 100%; padding: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="products">
    <!-- نموذج منتج واحد (كرره لباقي المنتجات) -->
    <div class="card">
        <div class="slider">
            <img src="IMG_3010.jpeg" class="active">
            <img src="IMG_3011.jpeg">
            <img src="IMG_3014.jpeg">
        </div>
        <div class="nav-arrows">
            <button onclick="prev(this)">⬅</button>
            <button onclick="next(this)">➡</button>
        </div>
        <h3>أسورة كابلز</h3>
        <p>150 ج</p>
        <button class="buy-btn" onclick="alert('تمت الإضافة للسلة!')">أضف للسلة 🛒</button>
    </div>
</div>

<script>
    function next(btn) {
        let slider = btn.parentElement.parentElement.querySelector('.slider');
        let imgs = Array.from(slider.querySelectorAll('img'));
        let active = slider.querySelector('img.active');
        let index = imgs.indexOf(active);
        active.classList.remove('active');
        imgs[(index + 1) % imgs.length].classList.add('active');
    }
    function prev(btn) {
        let slider = btn.parentElement.parentElement.querySelector('.slider');
        let imgs = Array.from(slider.querySelectorAll('img'));
        let active = slider.querySelector('img.active');
        let index = imgs.indexOf(active);
        active.classList.remove('active');
        imgs[(index - 1 + imgs.length) % imgs.length].classList.add('active');
    }
</script>
</body>
</html>

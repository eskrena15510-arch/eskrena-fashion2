<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>MGstor | المتجر الكامل</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 10px; }
        .nav-bar { display: flex; overflow-x: auto; background: white; padding: 10px; border-radius: 12px; margin-bottom: 20px; gap: 10px; }
        .nav-btn { background: #333; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; white-space: nowrap; }
        .card { background: white; padding: 15px; margin-bottom: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .slider { position: relative; width: 100%; height: 250px; overflow: hidden; border-radius: 12px; margin-bottom: 5px; }
        .slider img { display: none; width: 100%; height: 100%; object-fit: cover; }
        .slider img.active { display: block; }
        .nav-arrows { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .nav-arrows button { background: #eee; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; }
        .cart-box { background: #fff; padding: 20px; border: 2px dashed #25d366; border-radius: 15px; margin-bottom: 30px; }
        .buy-btn { background: #25d366; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        input { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; }
        .del-btn { background: #ff4757; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<h1 style="text-align:center;">MGstor 🎁</h1>

<div class="nav-bar">
    <button class="nav-btn" onclick="filter('all')">الكل</button>
    <button class="nav-btn" onclick="filter('box')">🎁 بوكسات</button>
    <button class="nav-btn" onclick="filter('bracelet')">📿 أساور</button>
    <button class="nav-btn" onclick="filter('necklace')">💎 سلاسل</button>
    <button class="nav-btn" onclick="filter('ring')">💍 خواتم</button>
</div>

<div class="cart-box">
    <h3>🛒 سلة طلباتك</h3>
    <ul id="cart-list"></ul>
    <p>الإجمالي: <span id="total" style="color:red; font-weight:bold;">0</span> ج</p>
    <input type="text" id="name" placeholder="الاسم">
    <input type="tel" id="phone" placeholder="الهاتف">
    <input type="text" id="address" placeholder="العنوان">
    <button class="buy-btn" onclick="sendOrder()">إرسال الطلب واتساب 📲</button>
</div>

<div id="products">
    <div class="card bracelet"><div class="slider"><img src="IMG_3010.jpeg" class="active"><img src="IMG_3011.jpeg"><img src="IMG_3014.jpeg"></div><div class="nav-arrows"><button onclick="prev(this)">⬅</button><button onclick="next(this)">➡</button></div><h3>أسورة كابلز</h3><p>150 ج</p><button onclick="addItem('أسورة كابلز', 150)">أضف للسلة 🛒</button></div>
    <div class="card box"><div class="slider"><img src="box1.png" class="active"><img src="box1.png"><img src="box1.png"></div><div class="nav-arrows"><button onclick="prev(this)">⬅</button><button onclick="next(this)">➡</button></div><h3>بوكس هدايا</h3><p>600 ج</p><button onclick="addItem('بوكس هدايا', 600)">أضف للسلة 🛒</button></div>
    <div class="card ring"><div class="slider"><img src="ring1.jpg" class="active"><img src="ring1.jpg"><img src="ring1.jpg"></div><div class="nav-arrows"><button onclick="prev(this)">⬅</button><button onclick="next(this)">➡</button></div><h3>خاتم ذهبي</h3><p>300 ج</p><button onclick="addItem('خاتم ذهبي', 300)">أضف للسلة 🛒</button></div>
    </div>

<script>
    function next(btn) { let slider = btn.parentElement.parentElement.querySelector('.slider'); let imgs = Array.from(slider.querySelectorAll('img')); let active = slider.querySelector('img.active'); let index = imgs.indexOf(active); active.classList.remove('active'); imgs[(index + 1) % imgs.length].classList.add('active'); }
    function prev(btn) { let slider = btn.parentElement.parentElement.querySelector('.slider'); let imgs = Array.from(slider.querySelectorAll('img')); let active = slider.querySelector('img.active'); let index = imgs.indexOf(active); active.classList.remove('active'); imgs[(index - 1 + imgs.length) % imgs.length].classList.add('active'); }
    let cart = []; let total = 0;
    function addItem(n, p) { cart.push({name: n, price: p}); total += p; renderCart(); }
    function removeItem(i) { total -= cart[i].price; cart.splice(i, 1); renderCart(); }
    function renderCart() { let list = document.getElementById("cart-list"); list.innerHTML = ""; cart.forEach((item, index) => { list.innerHTML += `<li>${item.name} (${item.price} ج) <button class="del-btn" onclick="removeItem(${index})">حذف</button></li>`; }); document.getElementById("total").innerText = total; }
    function filter(cat) { document.querySelectorAll('.card').forEach(item => { item.style.display = (cat === 'all' || item.classList.contains(cat)) ? "block" : "none"; }); }
    function sendOrder() { let n = document.getElementById('name').value; let ph = document.getElementById('phone').value; let ad = document.getElementById('address').value; if(!n || !ph || !ad) { alert("أكمل البيانات!"); return; } window.open("https://wa.me/201064031909?text=" + `طلب جديد:%0Aالمنتجات: ${cart.map(i => i.name).join(', ')}%0Aالإجمالي: ${total} ج%0Aالاسم: ${n}%0Aالهاتف: ${ph}%0Aالعنوان: ${ad}`); }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MGstor | متجر الهدايا والإكسسوارات</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<button class="floating-cart" onclick="toggleCart()">🛒 (<span id="cartCount">0</span>)</button>

<div id="cartBox" class="cart-box hidden">
    <button class="close-btn" onclick="toggleCart()">✖</button>
    <h3>سلة المشتريات</h3>
    <div id="cartItemsList"></div>
    <div class="cart-total">الإجمالي: <span id="totalPrice">0</span> جنيه</div>
    <input type="text" id="clientName" placeholder="الاسم الكريم">
    <input type="tel" id="clientPhone" placeholder="رقم الهاتف">
    <button class="order-btn" onclick="checkout()">تأكيد الطلب عبر واتساب</button>
</div>

<header>
    <h1>MGstor</h1>
    <input type="text" id="searchInput" placeholder="🔍 ابحث عن منتج..." onkeyup="filterProducts()">
    <div class="categories">
        <button onclick="filterCategory('all')">الكل</button>
        <button onclick="filterCategory('box')">🎁 بوكسات</button>
        <button onclick="filterCategory('bracelet')">📿 أساور</button>
        <button onclick="filterCategory('necklace')">💎 سلاسل</button>
    </div>
</header>

<main id="products" class="grid-container">
    <div class="product-card" data-category="box" data-name="بوكس هدايا">
        <img src="box1.png" alt="بوكس">
        <h3>بوكس هدايا</h3>
        <p class="price">600 جنيه</p>
        <button onclick="addToCart('بوكس هدايا', 600)">إضافة للسلة</button>
    </div>
    <div class="product-card" data-category="bracelet" data-name="اسورة كارتير">
        <img src="cartier.jpg" alt="اسورة">
        <h3>اسورة كارتير</h3>
        <p class="price">180 جنيه</p>
        <button onclick="addToCart('اسورة كارتير', 180)">إضافة للسلة</button>
    </div>
</main>

<script src="script.js"></script>
</body>
</html>

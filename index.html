<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>MGstor | المتجر</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 10px; }
        .card { background: white; padding: 15px; margin-bottom: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card img { width: 100%; border-radius: 10px; margin-bottom: 10px; }
        .cart-box { background: #fff; padding: 20px; border: 2px dashed #25d366; border-radius: 15px; margin-bottom: 30px; }
        .buy-btn { background: #25d366; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        input { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .add-btn { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<h1 style="text-align:center;">MGstor 🎁</h1>

<div class="cart-box">
    <h3>🛒 سلة طلباتك</h3>
    <ul id="cart-list"></ul>
    <p>الإجمالي: <span id="total" style="color:red; font-weight:bold;">0</span> ج</p>
    <input type="text" id="name" placeholder="الاسم">
    <input type="tel" id="phone" placeholder="الهاتف">
    <input type="text" id="address" placeholder="العنوان">
    <button class="buy-btn" onclick="sendOrder()">إرسال الطلب واتساب 📲</button>
</div>

<div id="products">
    <div class="card">
        <img src="IMG_3010.jpeg">
        <h3>أسورة كابلز</h3>
        <p>150 ج</p>
        <button class="add-btn" onclick="addItem('أسورة كابلز', 150)">أضف للسلة 🛒</button>
    </div>
</div>

<script>
    let cart = []; let total = 0;
    function addItem(n, p) { cart.push({name: n, price: p}); total += p; renderCart(); }
    function renderCart() { 
        let list = document.getElementById("cart-list"); list.innerHTML = ""; 
        cart.forEach((item, index) => { list.innerHTML += `<li>${item.name} (${item.price} ج)</li>`; }); 
        document.getElementById("total").innerText = total; 
    }
    function sendOrder() { 
        let n = document.getElementById('name').value; let ph = document.getElementById('phone').value; let ad = document.getElementById('address').value; 
        if(!n || !ph || !ad) { alert("أكمل البيانات!"); return; } 
        window.open("https://wa.me/201064031909?text=" + `طلب جديد:%0Aالمنتجات: ${cart.map(i => i.name).join(', ')}%0Aالإجمالي: ${total} ج%0Aالاسم: ${n}%0Aالهاتف: ${ph}%0Aالعنوان: ${ad}`); 
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MGstor | متجر الهدايا والإكسسوارات</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">🛍️ MGstor</div>
    <nav class="category-nav">
        <a href="#gifts">🎁 الهدايا</a>
        <a href="#accessories">💍 إكسسوارات</a>
        <a href="#watches">⌚ ساعات</a>
    </nav>
</header>

<section id="products" class="products">
    
    <h2 class="category-title" id="gifts">🎁 بوكسات الهدايا</h2>
    <div class="products-grid">
        <div class="card" onclick="addToCart('بوكس هدايا MGstor', 600)">
            <img src="box1.png" alt="بوكس">
            <h3>بوكس هدايا MGstor</h3>
            <p class="price">600 ج.م</p>
            <button>أضف للسلة</button>
        </div>
    </div>

    <h2 class="category-title" id="accessories">💍 الإكسسوارات</h2>
    <div class="products-grid">
        <div class="card" onclick="addToCart('اسوره ايه الكرسي', 120)">
            <h3>اسوره ايه الكرسي</h3>
            <p class="price">120 ج.م</p>
            <button>أضف للسلة</button>
        </div>
        <div class="card" onclick="addToCart('انسيال فان كليف', 150)">
            <h3>انسيال فان كليف</h3>
            <p class="price">150 ج.م</p>
            <button>أضف للسلة</button>
        </div>
    </div>

    <h2 class="category-title" id="watches">⌚ الساعات</h2>
    <div class="products-grid">
        <div class="card">
            <h3>ساعة يد رجالي</h3>
            <p class="price">500 ج.م</p>
            <button>أضف للسلة</button>
        </div>
    </div>
</section>

<div class="cart-box">
    <button class="cart-btn" onclick="toggleCart()">🛒 السلة (<span id="cart-count">0</span>)</button>
    <div id="cart" class="cart hidden">
        <h3>🛒 سلة المشتريات</h3>
        <ul id="cart-items"></ul>
        <div class="cart-total">الإجمالي: <span id="cart-total-price">0</span> جنيه</div>
        <input type="text" id="client-name" placeholder="الاسم">
        <input type="text" id="client-phone" placeholder="رقم الهاتف">
        <button class="checkout-btn" onclick="submitOrder()">إرسال الطلب واتساب 💬</button>
        <button class="close-btn" onclick="toggleCart()">إغلاق</button>
    </div>
</div>

<footer id="contact">
    <a class="btn" href="https://wa.me/201064031909" target="_blank">راسلنا على واتساب</a>
</footer>
<script src="script.js"></script>
</body>
</html>
